#
# Federation SQL queries for DjVu migration
# Run against the djvu_migrate in-memory SQLite db loaded by DjVuMigration.prepare()
# Tables: djvu (from DjVu SQLite), mw_images (from MediaWiki API cache), wiki (from MariaDB)
# WF 2026-02-24
#

# Stats for the djvu table
'djvu_stats':
  param_list:
  sql: |
    SELECT
      count(*) as files,
      min(iso_date) as oldest,
      max(iso_date) as newest,
      max(page_count) as max_pages,
      round(avg(page_count), 1) as avg_pages,
      max(filesize) as max_filesize,
      round(avg(filesize), 0) as avg_filesize
    FROM djvu

# Stats for the mw_images table
'mw_images_stats':
  param_list:
  sql: |
    SELECT
      count(*) as files,
      min(timestamp) as oldest,
      max(timestamp) as newest
    FROM mw_images

# Stats for the wiki table
'wiki_stats':
  param_list:
  sql: |
    SELECT
      count(*) as files,
      min(oldest) as oldest,
      max(newest) as newest
    FROM wiki

# Federated: mw_images entries not present in djvu (join on '/images'||relpath = path)
'mw_images_not_in_djvu':
  param_list:
    - name: limit
      type: int
      default_value: 10
  sql: |
    SELECT m.relpath, m.filename, m.timestamp, m.size
    FROM mw_images m
    LEFT JOIN djvu d ON '/images' || m.relpath = d.path
    WHERE d.path IS NULL
    ORDER BY m.relpath
    LIMIT {{ limit }}

# Federated: djvu entries not present in mw_images (join on path = '/images'||relpath)
'djvu_not_in_mw_images':
  param_list:
    - name: limit
      type: int
      default_value: 10
  sql: |
    SELECT d.path, d.iso_date, d.filesize, d.page_count
    FROM djvu d
    LEFT JOIN mw_images m ON d.path = '/images' || m.relpath
    WHERE m.relpath IS NULL
    ORDER BY d.path
    LIMIT {{ limit }}

# Rule 1: file exists in djvu DB — returns the djvu record for the given path
'djvu_for_relpath':
  param_list:
    - name: path
      type: str
      default_value: "/images/0/00/Ev-g1816.djvu"
  sql: |
    SELECT path, iso_date, filesize, page_count, bundled
    FROM djvu
    WHERE path = '{{ path }}'

# Rule 2: file exists in mw_images API cache — returns the mw record for the given relpath
'mw_images_for_relpath':
  param_list:
    - name: relpath
      type: str
      default_value: "/0/00/Ev-g1816.djvu"
  sql: |
    SELECT relpath, filename, timestamp, size
    FROM mw_images
    WHERE relpath = '{{ relpath }}'
