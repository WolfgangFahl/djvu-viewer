#
# SQL queries for DjVu files of
# Genealogie Wiki https://wiki.genealogy.net
# WF 2025-02-28
#
# --- DjVu SQLite queries (run against the real DjVu SQLite db via DjVuManager) ---

# Valid bundled entries: bundled=1, filesize not null, ordered small to large
'valid_bundled':
  param_list:
    - name: limit
      type: int
      default_value: 10000
  sql: |
    SELECT
      path, filename, page_count, filesize, iso_date
    FROM DjVu
    WHERE bundled = 1
      AND filesize IS NOT NULL
    ORDER BY filesize ASC
    LIMIT {{ limit }}

# Count of valid bundled vs total
'valid_bundled_stats':
  param_list:
  sql: |
    SELECT
      count(*) as total,
      sum(CASE WHEN bundled = 1 AND filesize IS NOT NULL THEN 1 ELSE 0 END) as valid_bundled,
      sum(CASE WHEN bundled = 1 AND filesize IS NULL THEN 1 ELSE 0 END) as bundled_no_size,
      sum(CASE WHEN bundled = 0 OR bundled IS NULL THEN 1 ELSE 0 END) as not_bundled,
      round(sum(CASE WHEN bundled = 1 AND filesize IS NOT NULL THEN filesize ELSE 0 END)/1024/1024/1024.0, 2) as valid_gb
    FROM DjVu

# Gesamtanzahl der Dateien und Seiten ermitteln
'total':
  param_list:
  sql: |
    SELECT
      count(*) as files,
      sum(page_count) as pages
    FROM DjVu

# Bilder nach DPI zählen
'dpi':
  param_list:
  sql: |
    SELECT count(*), dpi
    FROM Page
    GROUP BY dpi

# Seitenanzahl-Informationen
'page_and_size':
  param_list:
  sql: |
    SELECT
      path,
      page_count,
      filesize
    FROM DjVu
    ORDER BY page_count DESC,filesize DESC

# Sizes and compression ratio for bundled files
'bundled_sizes_and_ratio':
  param_list:
  sql: |
    SELECT
      ROUND(SUM(filesize)/1024/1024/1024.0, 1) AS total_djvu_gb,
      ROUND(SUM(package_filesize)/1024/1024/1024.0, 1) AS total_package_gb,
      ROUND(CAST(SUM(package_filesize) AS REAL) / SUM(filesize), 1) AS average_ratio
    FROM DjVu
    WHERE bundled = 1

# Alle DjVu-Datensätze abrufen
'all_djvu':
  param_list:
    - name: limit
      type: int
      default_value: 10000
  sql: |
    SELECT
      *
    FROM DjVu
    ORDER BY page_count
    LIMIT {{ limit }}

# Einen DjVu-Datensatz für einen path abrufen
'djvu_for_path':
  param_list:
    - name: path
      type: str
      default_value: "/images/1/1e/AB1953-Gohr.djvu"
  sql: |
    SELECT
      *
    FROM DjVu
    WHERE path= "{{ path }}"

# DjVu-Datensätze nach Pfad-Pattern filtern
'djvu_by_path_pattern':
  param_list:
    - name: pattern
      type: str
      default_value: "0/00"
    - name: limit
      type: int
      default_value: 10000
  sql: |
    SELECT
      *
    FROM DjVu
    WHERE path LIKE '%{{ pattern }}%'
    ORDER BY path
    LIMIT {{ limit }}

# Alle Bild-Datensätze mit konfigurierbarem Limit abrufen
'all_pages':
  param_list:
    - name: limit
      type: int
      default_value: 50
  sql: |
    SELECT
      *
    FROM page
    ORDER BY path
    LIMIT {{ limit }}

# Alle Bild-Datensätze für einen Pfad mit konfigurierbarem Limit abrufen
'pages_of_djvu':
  param_list:
    - name: limit
      type: int
      default_value: 50
    - name: djvu_path
      type: str
      default_value: "/images/1/1e/AB1953-Gohr.djvu"
  sql: |
    SELECT
      *
    FROM page
    WHERE djvu_path= "{{ djvu_path }}"
    ORDER BY page_index
    LIMIT {{ limit }}

# Gültige und ungültige Seiten pro DjVu zählen
'djvu_by_valid_pages':
  param_list:
  sql: |
    SELECT
      djvu_path,
      COUNT(*) as total_pages,
      SUM(CASE WHEN valid THEN 1 ELSE 0 END) as valid_pages,
      SUM(CASE WHEN NOT valid THEN 1 ELSE 0 END) as invalid_pages
    FROM page
    GROUP BY djvu_path
    ORDER BY valid_pages DESC
